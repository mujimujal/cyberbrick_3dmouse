; PlatformIO Project Configuration File
; CyberBrick ESP32-C3 3D Mouse Firmware
; 基于拓竹Cyberbrick遥控器组件改造的3D空间鼠标
; 支持有线USB + 无线BLE双模式，兼容3Dconnexion官方驱动

[env:cyberbrick_esp32c3]
platform = espressif32@^6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_BT_ENABLED=y
    -D CONFIG_BLUEDROID_ENABLED=y
    -D CONFIG_BLE_ENABLED=y
    -D ENABLE_USB_HID
lib_deps = 
    T-vK/ESP32 BLE Keyboard@^0.3.0
board_build.flash_size = 4MB
board_build.f_cpu = 160000000L
; 开启编译优化
build_type = release
